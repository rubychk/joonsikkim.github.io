<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile preview — Joonsik Kim</title>
<link rel="icon" type="image/png" href="favicon.png" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ece9df; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
  #root { width: 100vw; height: 100vh; }
  .legend {
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6f6a5e;
  }
</style>
<script>
  // Seed the DCViewport localStorage key so the canvas opens at a comfortable
  // zoom on first visit (defaultZoom=0.55 passed to DesignCanvas but not yet
  // wired through DCViewport's own props). Subsequent visits restore the saved
  // pan/zoom position as usual.
  (function () {
    try {
      var key = 'dc-viewport:' + location.pathname;
      if (!localStorage.getItem(key)) {
        localStorage.setItem(key, JSON.stringify({ x: 60, y: 60, scale: 0.55 }));
      }
    } catch (e) {}
  })();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function PhoneFrame({ src }) {
  return (
    <div style={{ width: 402, height: 874, position: 'relative' }}>
      <IOSDevice width={402} height={874}>
        {/* Push the site below the iOS status bar so the brand header is readable */}
        <div style={{ height: '100%', paddingTop: 47, boxSizing: 'border-box' }}>
          <iframe
            src={src}
            title={src}
            style={{
              width: '100%',
              height: '100%',
              border: 0,
              display: 'block',
              background: '#fafaf7',
            }}
          />
        </div>
      </IOSDevice>
    </div>
  );
}

function App() {
  const pages = [
    { id: 'home',     label: 'Home',     src: 'index.html' },
    { id: 'research', label: 'Research', src: 'research.html' },
    { id: 'cv',       label: 'CV',       src: 'cv.html' },
    { id: 'contact',  label: 'Contact',  src: 'contact.html' },
  ];

  return (
    <DesignCanvas
      title="Joonsik Kim — Mobile"
      subtitle="All four pages at iPhone 14 Pro width · 402×874"
      defaultZoom={0.55}
    >
      <DCSection id="pages" title="Pages">
        {pages.map(p => (
          <DCArtboard
            key={p.id}
            id={p.id}
            label={p.label}
            width={402}
            height={874}
          >
            <PhoneFrame src={p.src} />
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection id="states" title="Interactive states">
        <DCArtboard id="nav-open" label="Home — Nav drawer open" width={402} height={874}>
          <PhoneFrame src="index.html?_state=nav" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// Optional: open the nav drawer in the "nav-open" frame after load
window.addEventListener('message', () => {});

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-open the nav drawer in iframes loaded with ?_state=nav
document.addEventListener('load', (e) => {
  if (e.target && e.target.tagName === 'IFRAME') {
    try {
      const url = new URL(e.target.src, location.href);
      if (url.searchParams.get('_state') === 'nav') {
        const win = e.target.contentWindow;
        const tryOpen = () => {
          const btn = win.document.getElementById('menu-toggle');
          if (btn) btn.click();
          else setTimeout(tryOpen, 80);
        };
        tryOpen();
      }
    } catch (err) {}
  }
}, true);
</script>

</body>
</html>
